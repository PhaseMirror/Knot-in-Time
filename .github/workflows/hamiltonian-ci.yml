name: Helix Hamiltonian Integration (Hknot)

on:
  push:
    branches: [ "main", "v3.0-final" ]
  pull_request:
    branches: [ "main" ]

jobs:
  hamiltonian-physics:
    name: Hknot Quantum Bounds (Unit Tests)
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Set up Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install Hamiltonian Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: L1 Syntactic Guard - Black (Formatting)
        run: |
          echo "🦆 Enforcing strict topological formatting..."
          black --check .

      - name: L1 Syntactic Guard - Ruff (Static Analysis)
        run: |
          echo "⚡ Running fast static epistemic verification..."
          ruff check .
          
      - name: Verify Form Axis (H_free)
        run: |
          echo "🛡️ Executing Constitutional Physics..."
          pytest tests/physics/test_h_free.py -v
