name: Helix-Hamiltonian Release
on:
  push:
    tags:
      - 'v*'

env:
  # 🚀 FORCE NODE 24: Kills the deprecation warning immediately
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  audit-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 🧪 THE ATOMIC CLEAN: Fixes the BOM and CRLF at the disk level
      - name: Purge Windows Ghost Characters
        run: |
          find . -type f -name "pyproject.toml" -exec perl -pi -e 's/\xEF\xBB\xBF//g' {} +
          find . -type f -name "pyproject.toml" -exec perl -pi -e 's/\r\n/\n/g' {} +
          echo "✅ pyproject.toml is now pure UTF-8 (LF)."

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip' # Speeds up the manifold

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build pytest

      # 🔬 THE SUBSTRATE AUDIT: Will now pass with clean metadata
      - name: Run Hknot Quantum Bounds
        run: pytest tests/test_red_team_audit.py tests/test_feynman_shield.py

      - name: Build Package
        run: python -m build

      - name: Store Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

  publish-pypi:
    needs: audit-and-build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
